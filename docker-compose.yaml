services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notiflow
      POSTGRES_PASSWORD: notiflow
      POSTGRES_DB: notiflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notiflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 30s
      retries: 15
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications.email --partitions 6 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications.webhook --partitions 6 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications.sms --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications.audit --partitions 3 --replication-factor 1 &&
        echo 'All topics created!'
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://notiflow:notiflow@postgres:5432/notiflow?sslmode=disable
      up

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://notiflow:notiflow@postgres:5432/notiflow?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://notiflow:notiflow@postgres:5432/notiflow?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      TEMPLATE_SERVICE_URL: http://template:8082
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      template:
        condition: service_started

  template:
    build:
      context: .
      dockerfile: services/templates/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://notiflow:notiflow@postgres:5432/notiflow?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  email-consumer:
    build:
      context: .
      dockerfile: consumers/email/Dockerfile
    environment:
      DATABASE_URL: postgres://notiflow:notiflow@postgres:5432/notiflow?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SES_FROM_ADDRESS: notifications@notiflow.io
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  postgres_data: